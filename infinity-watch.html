<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="InfinityWatch">
<title>InfinityWatch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0b14;--surface:#161122;--surface2:#1e1730;
  --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.15);
  --text:#f0ecf8;--muted:#9b90b8;--hint:#4a4060;
  --purple:#6b3fa0;--purple2:#9b30e0;--purple-glow:rgba(107,63,160,0.4);
  --green:#18c87a;--yellow:#f5d020;--blue:#2088e0;--red:#e03040;--orange:#e87820;
  --r-lg:16px;--r-md:10px;--r-sm:6px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{padding:48px 16px 12px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-size:21px;font-weight:600;color:var(--text)}
.app-title span{color:var(--purple2)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ORDER TOGGLE */
.order-toggle{display:flex;gap:6px;margin-bottom:10px}
.order-btn{flex:1;padding:7px;border-radius:var(--r-sm);font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--border-strong);background:transparent;color:var(--muted);transition:all 0.2s;letter-spacing:0.3px}
.order-btn.active{background:var(--purple);border-color:var(--purple);color:#fff;box-shadow:0 0 12px var(--purple-glow)}

/* HEROES STRIP */
.heroes-strip{display:flex;gap:6px;margin-bottom:10px;justify-content:center}
.hero-pip{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.04);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center}
.hero-pip svg{width:22px;height:22px}

/* PROGRESS */
.progress-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.progress-track{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--purple2),var(--red));transition:width 0.5s}

/* PHASE */
.phase-header{padding:16px 16px 5px;font-size:10px;font-weight:500;letter-spacing:2.5px;color:var(--purple);text-transform:uppercase}

/* FILM CARD */
.film-card{margin:0 12px 7px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:12px 14px;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.15s}
.film-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.film-card.watched::before{background:var(--green)}
.film-card.in-progress::before{background:var(--yellow)}
.film-card.locked{opacity:0.5}
.film-row{display:flex;align-items:center;gap:12px}
.film-icon{width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,0.04);border:0.5px solid var(--border);border-radius:12px;font-size:24px}
.film-icon svg{width:32px;height:32px}
.film-meta{flex:1;min-width:0}
.film-title{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.film-sub{font-size:12px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.status-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dot-watched{background:var(--green);box-shadow:0 0 5px var(--green)}
.dot-progress{background:var(--yellow);box-shadow:0 0 5px var(--yellow)}
.dot-locked{background:var(--hint)}
.star-inline{color:var(--yellow);font-size:12px}
.pct-badge{font-size:11px;color:var(--yellow);background:rgba(245,208,32,0.1);border:0.5px solid rgba(245,208,32,0.3);border-radius:10px;padding:1px 6px}
.chevron{font-size:16px;color:var(--hint);flex-shrink:0;display:inline-block;transition:transform 0.2s}
.chevron.open{transform:rotate(180deg)}

/* COMPLETION BADGE */
.completion-badge{display:none;position:absolute;inset:0;background:rgba(14,11,20,0.92);border-radius:var(--r-lg);align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:5}
.completion-badge.show{display:flex;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
.completion-badge .badge-text{font-size:22px;font-weight:700;color:var(--green);letter-spacing:1px}
.completion-badge .badge-stars{font-size:24px}

/* DETAIL MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:22px 22px 0 0;border:0.5px solid var(--border-strong);width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding:0 0 48px}
.modal-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:14px auto 0}
.modal-hero-header{padding:20px 20px 16px;border-bottom:0.5px solid var(--border)}
.modal-film-icon{width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border:0.5px solid var(--border);border-radius:14px;font-size:30px;margin-bottom:10px}
.modal-film-icon svg{width:38px;height:38px}
.modal-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px}
.modal-meta-row{display:flex;gap:8px;flex-wrap:wrap}
.meta-chip{font-size:11px;padding:3px 8px;background:rgba(255,255,255,0.05);border:0.5px solid var(--border);border-radius:10px;color:var(--muted)}
.modal-body{padding:16px 20px}
.modal-section{margin-bottom:18px}
.modal-section-title{font-size:10px;letter-spacing:2px;color:var(--purple);text-transform:uppercase;font-weight:500;margin-bottom:8px}
.modal-section p{font-size:13px;color:var(--muted);line-height:1.65}
.cast-list{display:flex;flex-direction:column;gap:6px}
.cast-item{font-size:13px;color:var(--muted)}
.cast-item strong{color:var(--text)}
.heroes-list{display:flex;flex-wrap:wrap;gap:6px}
.hero-tag{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border-strong);color:var(--text);cursor:pointer;background:rgba(255,255,255,0.04);transition:all 0.15s}
.hero-tag:hover,.hero-tag.active-filter{background:var(--purple);border-color:var(--purple);color:#fff}
.villain-tag{border-color:rgba(224,48,64,0.4);color:var(--red)}
.villain-tag:hover,.villain-tag.active-filter{background:var(--red);border-color:var(--red);color:#fff}

/* POST CREDIT */
.postcredit-box{background:rgba(245,208,32,0.06);border:0.5px solid rgba(245,208,32,0.25);border-radius:var(--r-md);padding:12px}
.postcredit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.postcredit-label{font-size:11px;color:var(--yellow);font-weight:500;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.postcredit-btn{font-size:11px;padding:4px 10px;border-radius:12px;border:0.5px solid rgba(245,208,32,0.4);background:transparent;color:var(--yellow);cursor:pointer}
.postcredit-btn.seen{background:rgba(245,208,32,0.15)}
.postcredit-text{font-size:13px;color:var(--muted);line-height:1.6;display:none}
.postcredit-text.visible{display:block}

/* SUMMARY BOX */
.summary-box{background:rgba(107,63,160,0.1);border:0.5px solid rgba(107,63,160,0.3);border-radius:var(--r-md);padding:10px 12px;font-size:13px;color:#c8b8e8;line-height:1.65}
.summary-label{font-size:10px;letter-spacing:1.5px;color:var(--purple);text-transform:uppercase;margin-bottom:5px;font-weight:500}

/* EDIT MODAL */
.edit-modal{background:var(--surface);border-radius:22px 22px 0 0;border:0.5px solid var(--border-strong);width:100%;max-width:430px;padding:20px 20px 48px}
.input-label{font-size:12px;color:var(--muted);margin:12px 0 4px}
.edit-modal input{width:100%;padding:9px 12px;border:0.5px solid var(--border-strong);border-radius:var(--r-md);font-size:14px;background:rgba(255,255,255,0.05);color:var(--text);outline:none;-webkit-appearance:none}
.edit-modal input:focus{border-color:var(--purple)}
.stars-input{display:flex;gap:8px;margin:8px 0}
.star-btn{font-size:28px;cursor:pointer;opacity:0.2;background:none;border:none;padding:0}
.star-btn.active{opacity:1}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1}
.action-btn{padding:9px;border-radius:var(--r-md);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border-strong);background:transparent;color:var(--text);display:flex;align-items:center;justify-content:center;gap:5px}
.action-btn.primary{background:var(--purple);border-color:var(--purple);color:#fff}
.action-btn.sm{padding:6px 12px;font-size:12px}

/* GEMS VIEW */
.gems-section{padding:16px}
.gems-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
.gems-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.gems-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gem-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:14px;cursor:pointer;transition:border-color 0.2s}
.gem-card:hover{border-color:var(--border-strong)}
.gem-dot{width:36px;height:36px;border-radius:50%;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.gem-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.gem-film{font-size:11px;color:var(--muted)}
.gems-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:1.7}

/* GEM DETAIL MODAL */
.gem-modal{background:var(--surface);border-radius:22px 22px 0 0;border:0.5px solid var(--border-strong);width:100%;max-width:430px;padding:24px 24px 48px}
.gem-modal-dot{width:64px;height:64px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px}
.gem-modal-name{font-size:22px;font-weight:600;text-align:center;margin-bottom:4px}
.gem-modal-film{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px}
.gem-modal-section{margin-bottom:14px}
.gem-modal-label{font-size:10px;letter-spacing:2px;color:var(--purple);text-transform:uppercase;font-weight:500;margin-bottom:6px}
.gem-modal-text{font-size:13px;color:var(--muted);line-height:1.65}

/* STATS */
.stats-section{padding:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:14px}
.stat-card.full{grid-column:1/-1}
.stat-val{font-size:24px;font-weight:500;color:var(--text)}
.stat-key{font-size:12px;color:var(--muted);margin-top:2px}

/* FILTER BANNER */
.filter-banner{margin:8px 12px;padding:8px 12px;background:rgba(107,63,160,0.15);border:0.5px solid rgba(107,63,160,0.4);border-radius:var(--r-md);display:none;align-items:center;justify-content:space-between;font-size:12px;color:#c090ff}
.filter-banner.show{display:flex}
.filter-clear{background:none;border:none;color:#c090ff;cursor:pointer;font-size:12px;text-decoration:underline}

/* BOTTOM NAV */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:0.5px solid var(--border);padding:10px 24px 28px;display:flex;justify-content:space-around}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0}
.nav-btn.active{color:var(--purple2)}
.nav-btn svg{width:24px;height:24px}

/* VIEWS */
.view{display:none}
.view.active{display:block}

/* PIN */
.pin-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:32px}
.pin-gauntlet{margin-bottom:20px}
.pin-title{font-size:24px;font-weight:600;color:var(--text);margin-bottom:6px}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:28px;text-align:center;line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity 0.3s;z-index:300;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div class="pin-screen" id="pin-screen" style="display:none"></div>

<div class="toast" id="toast"></div>

<div class="app" id="main-app">

  <!-- HOME VIEW -->
  <div id="view-home" class="view active">
    <div class="header">
      <div class="header-top">
        <div class="app-title">Infinity<span>Watch</span><span class="sync-dot" id="sync-dot" style="display:none"></span></div>
      </div>
      <div class="order-toggle">
        <button class="order-btn active" id="btn-release" onclick="setOrder('release')">🎬 Ordine Uscita</button>
        <button class="order-btn" id="btn-story" onclick="setOrder('story')">📅 Ordine Storia</button>
      </div>
      <div class="heroes-strip">
        <div class="hero-pip"><svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#60aaff" stroke-width="1.8"/><circle cx="20" cy="20" r="12" stroke="#60aaff" stroke-width="1.2"/><circle cx="20" cy="20" r="6" stroke="#60aaff" stroke-width="1"/><polygon points="20,32 9.6,14 30.4,14" fill="#60aaff"/></svg></div>
        <div class="hero-pip"><svg viewBox="0 0 44 44" fill="none"><rect x="11" y="33" width="18" height="9" rx="3" fill="#28b854"/><rect x="7" y="21" width="26" height="14" rx="3" fill="#2ecf60"/><rect x="8" y="13" width="5.5" height="10" rx="2.2" fill="#2ecf60"/><rect x="14.5" y="11" width="5.5" height="12" rx="2.2" fill="#2ecf60"/><rect x="21" y="11" width="5.5" height="12" rx="2.2" fill="#2ecf60"/><rect x="27.5" y="13" width="5.5" height="10" rx="2.2" fill="#2ecf60"/><rect x="3" y="23" width="6" height="9" rx="2.5" fill="#2ecf60"/><line x1="8" y1="21" x2="33" y2="21" stroke="#1aaa48" stroke-width="1.2"/></svg></div>
        <div class="hero-pip"><svg viewBox="0 0 40 40" fill="none"><rect x="7.5" y="3" width="25" height="16" rx="2.5" fill="#8a8a8a" stroke="#aaaaaa" stroke-width="1"/><line x1="10" y1="8" x2="30" y2="8" stroke="#666" stroke-width="0.8"/><line x1="10" y1="13" x2="30" y2="13" stroke="#666" stroke-width="0.8"/><rect x="17" y="19" width="6" height="15" rx="2" fill="#7a4a20"/><rect x="14" y="31" width="12" height="3.5" rx="1.5" fill="#5a3410"/></svg></div>
        <div class="hero-pip"><svg viewBox="0 0 40 40" fill="none"><polygon points="20,24 5,5 35,5" fill="#e03040"/><polygon points="20,16 5,35 35,35" fill="#e03040"/></svg></div>
        <div class="hero-pip"><svg viewBox="0 0 40 40" fill="none"><path d="M5 35 Q6 6 35 5" stroke="#c8b060" stroke-width="2.2" fill="none" stroke-linecap="round"/><line x1="5" y1="35" x2="35" y2="5" stroke="#c8b060" stroke-width="0.8" stroke-dasharray="2,2.5"/><polygon points="35,5 29,8 32,13" fill="#c8b060"/></svg></div>
        <div class="hero-pip"><svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="19" fill="#CC1111"/><circle cx="20" cy="20" r="15.25" fill="#EEEEEE"/><circle cx="20" cy="20" r="11.5" fill="#CC1111"/><circle cx="20" cy="20" r="7.75" fill="#1133BB"/><polygon points="20,12.25 21.74,17.61 27.37,17.61 22.81,20.91 24.56,26.27 20,22.96 15.44,26.27 17.19,20.91 12.63,17.61 18.26,17.61" fill="white"/></svg></div>
      </div>
      <div class="progress-meta"><span id="prog-text">0 di 22 visti</span><span id="prog-pct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="filter-banner" id="filter-banner">
      <span id="filter-label">Filtro attivo</span>
      <button class="filter-clear" onclick="clearFilter()">✕ Rimuovi filtro</button>
    </div>
    <div id="film-list"></div>
  </div>

  <!-- GEMS VIEW -->
  <div id="view-gems" class="view">
    <div class="header" style="padding-top:48px">
      <div class="header-top"><div class="app-title">Gemme <span>dell'Infinito</span></div></div>
    </div>
    <div class="gems-section">
      <div class="gems-sub" id="gems-sub"></div>
      <div class="gems-grid" id="gems-grid"></div>
    </div>
  </div>

  <!-- STATS VIEW -->
  <div id="view-stats" class="view">
    <div class="header" style="padding-top:48px">
      <div class="header-top"><div class="app-title">Le <span>Stats</span></div></div>
    </div>
    <div class="stats-section">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val" id="s-watched">0</div><div class="stat-key">Film visti</div></div>
        <div class="stat-card"><div class="stat-val" id="s-remain">22</div><div class="stat-key">Da vedere</div></div>
        <div class="stat-card"><div class="stat-val" id="s-avg">—</div><div class="stat-key">Voto medio</div></div>
        <div class="stat-card"><div class="stat-val" id="s-phase">—</div><div class="stat-key">Fase attuale</div></div>
        <div class="stat-card full"><div class="stat-key" style="margin-bottom:6px">Miglior film</div><div style="font-size:15px;font-weight:500;color:var(--text)" id="s-best">—</div></div>
        <div class="stat-card full"><div class="stat-key" style="margin-bottom:8px">Voti dati</div><div id="s-ratings-list" style="font-size:13px;color:var(--muted);line-height:2">—</div></div>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-bar" id="bottom-bar">
  <button class="nav-btn active" id="nav-home" onclick="switchView('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
    Timeline
  </button>
  <button class="nav-btn" id="nav-gems" onclick="switchView('gems')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>
    Gemme
  </button>
  <button class="nav-btn" id="nav-stats" onclick="switchView('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="6" width="4" height="15"/><rect x="17" y="9" width="4" height="12"/></svg>
    Stats
  </button>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal" id="detail-modal"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-overlay" onclick="if(event.target===this)closeEdit()">
  <div class="edit-modal" id="edit-modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="edit-title" style="font-size:17px;font-weight:500;margin-bottom:16px;color:var(--text)">Modifica</div>
    <p class="input-label">Voto</p>
    <div class="stars-input"><button class="star-btn" onclick="setStar(1)">⭐</button><button class="star-btn" onclick="setStar(2)">⭐</button><button class="star-btn" onclick="setStar(3)">⭐</button><button class="star-btn" onclick="setStar(4)">⭐</button><button class="star-btn" onclick="setStar(5)">⭐</button></div>
    <p class="input-label">Data visione</p>
    <input type="date" id="edit-date">
    <p class="input-label">Minutaggio se interrotto (vuoto = visto per intero)</p>
    <input type="number" id="edit-min" placeholder="es. 74" min="0" max="999">
    <div class="modal-btns">
      <button class="action-btn" onclick="closeEdit()">Annulla</button>
      <button class="action-btn primary" onclick="saveEdit()">✓ Salva</button>
    </div>
  </div>
</div>

<!-- GEM MODAL -->
<div class="modal-overlay" id="gem-overlay" onclick="if(event.target===this)closeGem()">
  <div class="gem-modal" id="gem-modal"></div>

// ── STATE ──
var films=FILMS.map(f=>({...f,status:"upcoming",stars:null,date:null,minute:null,postCreditSeen:false}));
var currentOrder='release';
var activeFilter=null;
var openCard=null;
var editingId=null;
var tempStar=0;

// ── FIREBASE ──
var fbRef=db.ref('films');
fbRef.on('value',(snap)=>{
  const data=snap.val();
  if(data){
    films=FILMS.map(f=>({...f,...(data[f.id]||{status:"upcoming",stars:null,date:null,minute:null,postCreditSeen:false})}));
  } else {
    const init={};
    FILMS.forEach(f=>{init[f.id]={status:"upcoming",stars:null,date:null,minute:null,postCreditSeen:false};});
    fbRef.set(init);
  }
  document.getElementById('sync-dot').style.display='inline-block';
  renderAll();
});

function saveFilm(f){
  db.ref(`films/${f.id}`).update({status:f.status,stars:f.stars||null,date:f.date||null,minute:f.minute||null,postCreditSeen:f.postCreditSeen||false});
}

// ── HELPERS ──
function starsHTML(n){let h='';for(let i=1;i<=5;i++)h+=`<span class="star-inline" style="opacity:${i<=(n||0)?1:0.2}">★</span>`;return h;}
function fmt(d){if(!d)return'';const p=d.split('-');return`${p[2]}/${p[1]}/${p[0]}`;}
function iconCell(f,size=46){
  const svg=heroMap[f.id];
  const svgSize=Math.round(size*0.7);
  return svg
    ?`<div class="film-icon" style="width:${size}px;height:${size}px"><svg viewBox="${svg.match(/viewBox="([^"]+)"/)[1]}" style="width:${svgSize}px;height:${svgSize}px" fill="none">${svg.replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg></div>`
    :`<div class="film-icon" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.5)}px">${f.icon}</div>`;
}

function getSortedFilms(){
  const ordered=[...films].sort((a,b)=>
    currentOrder==='release'?a.releaseOrder-b.releaseOrder:a.storyOrder-b.storyOrder
  );
  if(activeFilter){
    return ordered.map(f=>{
      const inHeroes=f.heroes&&f.heroes.some(h=>h.toLowerCase().includes(activeFilter.toLowerCase()));
      const inVillains=f.villains&&f.villains.some(v=>v.toLowerCase().includes(activeFilter.toLowerCase()));
      return{...f,_filtered:inHeroes||inVillains};
    });
  }
  return ordered;
}

function getSummaryHTML(f){
  if(f.status==='upcoming')return'';
  if(f.status==='in-progress'&&f.minute){
    const partial=PARTIAL_SUMMARIES[f.id];
    let text;
    if(partial&&partial.default){text=partial.default(f.minute,f.duration);}
    else{
      const pct=Math.round((f.minute/f.duration)*100);
      const full=SUMMARIES[f.id]?.full||'';
      if(full){const words=full.split(' ');const cut=Math.max(20,Math.floor(words.length*(pct/100)*0.6));text=words.slice(0,cut).join(' ')+'… <em style="color:var(--hint);font-size:11px">[il resto è ancora da scoprire]</em>';}
      else{text=`Avete visto il film fino al minuto ${f.minute} di ${f.duration}.`;}
    }
    return`<div class="summary-box"><div class="summary-label">📖 Trama · fino al min ${f.minute}</div>${text}</div>`;
  }
  if(f.status==='watched'){
    const s=SUMMARIES[f.id]?.full;
    return s?`<div class="summary-box"><div class="summary-label">📖 Trama completa</div>${s}</div>`:'';
  }
  return'';
}

// ── RENDER LIST ──
function renderList(){
  const c=document.getElementById('film-list');
  const sorted=getSortedFilms();
  let html='',curPhase=0;

  if(activeFilter){
    const banner=document.getElementById('filter-banner');
    banner.classList.add('show');
    document.getElementById('filter-label').textContent=`Filtro: ${activeFilter}`;
  }

  sorted.forEach(f=>{
    if(f.phase!==curPhase&&currentOrder==='release'){
      curPhase=f.phase;
      html+=`<div class="phase-header">⬡ Phase ${curPhase}</div>`;
    }
    const cls=f.status==='watched'?'watched':f.status==='in-progress'?'in-progress':'locked';
    const dotCls=f.status==='watched'?'dot-watched':f.status==='in-progress'?'dot-progress':'dot-locked';
    const pct=f.minute?Math.round((f.minute/f.duration)*100):null;
    const sub=f.status==='watched'?'Visto':f.status==='in-progress'?`${f.minute}/${f.duration} min (${pct}%)`:'Da vedere';
    const dimmed=activeFilter&&f._filtered===false?'opacity:0.3;':'';

    html+=`<div class="film-card ${cls}" style="${dimmed}" onclick="openDetail(${f.id})">
      <div class="film-row">
        ${iconCell(f)}
        <div class="film-meta">
          <div class="film-title">${f.title}</div>
          <div class="film-sub">
            <span class="status-dot ${dotCls}"></span>
            <span>${sub}</span>
            ${f.stars?`<span>${starsHTML(f.stars)}</span>`:''}
            ${pct&&f.status==='in-progress'?`<span class="pct-badge">${pct}%</span>`:''}
          </div>
        </div>
        <span style="font-size:11px;color:var(--hint)">›</span>
      </div>
    </div>`;
  });
  c.innerHTML=html;
  updateProgress();
}

function updateProgress(){
  const w=films.filter(f=>f.status==='watched').length;
  const pct=Math.round((w/films.length)*100);
  document.getElementById('prog-text').textContent=`${w} di ${films.length} visti`;
  document.getElementById('prog-pct').textContent=`${pct}%`;
  document.getElementById('prog-fill').style.width=pct+'%';
}

  const villainTags=(f.villains||[]).map(v=>`<span class="hero-tag villain-tag" onclick="filterByChar('${v}',event)">${v}</span>`).join('');

      </div>
      <div class="modal-section">
        <div class="modal-section-title">Eroi presenti · tocca per filtrare</div>

      ${villainTags?`<div class="modal-section"><div class="modal-section-title">Villain</div><div class="heroes-list">${villainTags}</div></div>`:''}
      ${f.status!=='upcoming'?`
      <div class="modal-section">
        <div class="modal-section-title">🎬 Scena Post-Credit</div>
        <div class="postcredit-box">
          <div class="postcredit-header">
            <div class="postcredit-label">🎞️ ${pcSeen?'Vista!':'Non vista'}</div>
            <button class="postcredit-btn ${pcSeen?'seen':''}" onclick="togglePostCredit(${f.id})">${pcSeen?'✓ Vista':'Segna come vista'}</button>
          </div>
          <div class="postcredit-text ${pcSeen?'visible':''}" id="pc-text-${f.id}">${f.postCreditText||'Nessuna scena post-credit.'}</div>
        </div>
      </div>`:''}
      ${editBtn}
    </div>`;
  document.getElementById('detail-overlay').classList.add('open');
};

function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');};

function togglePostCredit(id){
  const f=films.find(x=>x.id===id);
  f.postCreditSeen=!f.postCreditSeen;
  saveFilm(f);
  // update UI without closing
  const btn=document.querySelector('.postcredit-btn');
  const text=document.getElementById(`pc-text-${id}`);
  if(btn){btn.textContent=f.postCreditSeen?'✓ Vista':'Segna come vista';btn.classList.toggle('seen',f.postCreditSeen);}
  if(text){text.classList.toggle('visible',f.postCreditSeen);}
  showToast(f.postCreditSeen?'🎬 Scena post-credit vista!':'Rimossa dai visti');
};

function filterByChar(name,e){
  e.stopPropagation();
  activeFilter=name;
  closeDetail();
  switchView('home');
  document.getElementById('filter-banner').classList.add('show');
  document.getElementById('filter-label').textContent=`Filtro: ${name}`;
  renderList();
};
function clearFilter(){
  activeFilter=null;
  document.getElementById('filter-banner').classList.remove('show');
  renderList();
};

// ── EDIT MODAL ──
function openEdit(id){
  editingId=id;
  const f=films.find(x=>x.id===id);
  document.getElementById('edit-title').textContent=f.title;
  document.getElementById('edit-date').value=f.date||'';
  document.getElementById('edit-min').value=f.minute||'';
  tempStar=f.stars||0;renderModalStars();
  document.getElementById('edit-overlay').classList.add('open');
};
function closeEdit(){document.getElementById('edit-overlay').classList.remove('open');};
function renderModalStars(){document.querySelectorAll('.star-btn').forEach((b,i)=>b.classList.toggle('active',i<tempStar));}
function setStar(n){tempStar=n;renderModalStars();};
function saveEdit(){
  const f=films.find(x=>x.id===editingId);
  f.stars=tempStar||null;
  f.date=document.getElementById('edit-date').value||null;
  const min=parseInt(document.getElementById('edit-min').value);
  if(min&&min>0){f.minute=min;f.status='in-progress';}
  else{f.minute=null;if(f.date)f.status='watched';}
  saveFilm(f);closeEdit();showToast('💾 Salvato');
  // show completion badge if newly watched
  if(f.status==='watched'&&!f.minute)showCompletionFor(f.id);
};

function showCompletionFor(id){
  // find card and flash
  setTimeout(()=>{
    renderList();
    showToast('🎉 Film completato!');
  },300);
}

function markWatched(id){
  const f=films.find(x=>x.id===id);
  f.status='watched';f.minute=null;
  saveFilm(f);showToast('✓ Segnato come visto');
};

// ── ORDER TOGGLE ──
function setOrder(o){
  currentOrder=o;
  document.getElementById('btn-release').classList.toggle('active',o==='release');
  document.getElementById('btn-story').classList.toggle('active',o==='story');
  renderList();
};

// ── GEMS ──
function getUnlockedGems(){
  return GEMS.filter(g=>{
    const triggerFilm=films.find(f=>f.id===g.unlockedBy);
    return triggerFilm&&triggerFilm.status==='watched';
  });
}

function renderGems(){
  const unlocked=getUnlockedGems();
  const grid=document.getElementById('gems-grid');
  const sub=document.getElementById('gems-sub');
  if(unlocked.length===0){
    sub.innerHTML='';
    grid.innerHTML=`<div class="gems-empty" style="grid-column:1/-1">Le gemme dell\'Infinito si sbloccano man mano che completate i film.<br><br>Continuate a guardare per scoprire i segreti dell\'universo Marvel! 🌌</div>`;
    return;
  }
  sub.textContent=`${unlocked.length} di 6 gemme scoperte`;
  grid.innerHTML=unlocked.map(g=>`
    <div class="gem-card" onclick="openGem('${g.id}')">
      <div class="gem-dot" style="background:${g.color}20;box-shadow:0 0 12px ${g.glow}">${g.emoji}</div>
      <div class="gem-name" style="color:${g.color}">${g.name}</div>
      <div class="gem-film">${g.film}</div>
    </div>`).join('');
}

function openGem(id){
  const g=GEMS.find(x=>x.id===id);
  if(!g)return;
  document.getElementById('gem-modal').innerHTML=`
    <div class="modal-handle"></div>
    <div class="gem-modal-dot" style="background:${g.color}20;box-shadow:0 0 20px ${g.glow};font-size:36px">${g.emoji}</div>
    <div class="gem-modal-name" style="color:${g.color}">${g.name}</div>
    <div class="gem-modal-film">Apparsa per la prima volta in<br><strong>${g.film}</strong></div>
    <div class="gem-modal-section">
      <div class="gem-modal-label">Poteri</div>
      <div class="gem-modal-text">${g.powers}</div>
    </div>
    <div class="gem-modal-section">
      <div class="gem-modal-label">Origine nel MCU</div>
      <div class="gem-modal-text">${g.origin}</div>
    </div>`;
  document.getElementById('gem-overlay').classList.add('open');
};
function closeGem(){document.getElementById('gem-overlay').classList.remove('open');};

// ── STATS ──
function updateStats(){
  const w=films.filter(f=>f.status==='watched');
  const rated=w.filter(f=>f.stars);
  const avg=rated.length?(rated.reduce((a,f)=>a+f.stars,0)/rated.length).toFixed(1):'—';
  const best=rated.length?rated.reduce((a,b)=>a.stars>b.stars?a:b):null;
  const phases=[...new Set(films.filter(f=>f.status!=='upcoming').map(f=>f.phase))];
  document.getElementById('s-watched').textContent=w.length;
  document.getElementById('s-remain').textContent=films.length-w.length;
  document.getElementById('s-avg').textContent=rated.length?`⭐ ${avg}`:'—';
  document.getElementById('s-phase').textContent=phases.length?`Phase ${Math.max(...phases)}`:'—';
  document.getElementById('s-best').textContent=best?`${best.title} (${best.stars}★)`:'—';
  document.getElementById('s-ratings-list').innerHTML=rated.length?rated.map(f=>`${f.title} — ${starsHTML(f.stars)}`).join('<br>'):'—';
}

// ── NAV ──
function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  if(v==='stats')updateStats();
  if(v==='gems')renderGems();
};

function renderAll(){renderList();if(document.getElementById('view-gems').classList.contains('active'))renderGems();}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
};
</script>
</body>
</html>
